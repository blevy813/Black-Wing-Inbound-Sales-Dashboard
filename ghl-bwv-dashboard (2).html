<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Wing Ventures — Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06090f;--s1:#0d1520;--s2:#111c2e;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--text:#eef2ff;--text2:#7a8aaa;--text3:#3a4560;--green:#00e5a0;--gdim:rgba(0,229,160,0.12);--gborder:rgba(0,229,160,0.28);--amber:#ffb340;--adim:rgba(255,179,64,0.12);--red:#ff5f5f;--rdim:rgba(255,95,95,0.1);--blue:#4da6ff;--purple:#9b7fff;--gold:#ffd060}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100vw;height:100vh;overflow:hidden}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* TOP BAR */
.topbar{height:64px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--s1);border-bottom:1px solid rgba(77,166,255,0.12)}
.brand{display:flex;align-items:center;gap:12px}
.brand-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:0.06em;color:#fff;text-transform:uppercase}
.brand-sub{font-size:9px;letter-spacing:0.2em;color:var(--blue);text-transform:uppercase;margin-top:-1px}
.topbar-center{display:flex;align-items:center;gap:8px}
.period-btn{font-size:12px;font-weight:600;padding:5px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:'Barlow',sans-serif;transition:all 0.15s;letter-spacing:0.02em}
.period-btn:hover{color:var(--text2)}
.period-btn.on{background:rgba(77,166,255,0.12);border-color:rgba(77,166,255,0.3);color:var(--blue)}
.date-input{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);font-family:'Barlow',sans-serif;cursor:pointer;outline:none;transition:border-color 0.15s;margin-left:4px}
.date-input:focus{border-color:rgba(77,166,255,0.4);color:var(--text)}
.date-input::-webkit-calendar-picker-indicator{filter:invert(0.4);cursor:pointer}
.topbar-right{display:flex;align-items:center;gap:14px}
.clock{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:0.06em;color:#fff;text-align:right}
.clock-date{font-size:9px;color:var(--text3);text-align:right;margin-top:-2px}
.live-pill{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:30px;background:var(--gdim);border:1px solid var(--gborder);font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.06em;text-transform:uppercase}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:lp 1.8s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,160,0.5)}50%{opacity:0.6;box-shadow:0 0 0 5px rgba(0,229,160,0)}}

/* BODY */
.body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;padding:16px 28px;gap:14px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex-shrink:0}
.metric{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:14px 18px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.m1::before{background:var(--green)}.m2::before{background:var(--blue)}.m4::before{background:var(--purple)}
.metric-label{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.metric-val{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;letter-spacing:-0.02em;line-height:1}
.m1 .metric-val{color:var(--green)}.m2 .metric-val{color:var(--blue)}.m3 .metric-val{color:var(--amber)}.m4 .metric-val{color:var(--purple)}
.metric-sub{font-size:13px;color:var(--text3);margin-top:6px}

/* MAIN */
.main{flex:1;display:grid;grid-template-columns:320px 1fr;gap:14px;min-height:0}

/* LEADERBOARD */
.lb{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.lb-head{padding:12px 16px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.lb-period{font-size:11px;color:var(--blue);font-weight:600}
.lb-list{flex:1;overflow-y:auto;scrollbar-width:none}
.lb-list::-webkit-scrollbar{display:none}
.lb-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative;transition:background 0.15s}
.lb-row.r1{background:rgba(255,208,96,0.05)}
.lb-row.r2{background:rgba(77,166,255,0.03)}
.lb-row.r3{background:rgba(155,127,255,0.03)}
.lb-rank{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;width:24px;text-align:center;flex-shrink:0;color:var(--text3)}
.r1 .lb-rank{color:var(--gold)}.r2 .lb-rank{color:#b0bcd4}.r3 .lb-rank{color:#c07a3a}
.lb-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:11px;color:var(--text3);margin-top:2px}
.lb-amt{text-align:right;flex-shrink:0}
.lb-prem{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#fff}
.r1 .lb-prem{color:var(--gold)}
.lb-bar-bg{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.04)}
.lb-bar{height:100%;transition:width 0.8s ease}
.r1 .lb-bar{background:var(--gold)}.r2 .lb-bar{background:#b0bcd4}.r3 .lb-bar{background:#c07a3a}
.lb-row:not(.r1):not(.r2):not(.r3) .lb-bar{background:var(--text3)}

/* FEED */
.feed{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.feed-top{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.feed-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
.feed-period{font-size:12px;color:var(--blue);font-weight:600;margin-left:8px}
.col-heads{display:grid;grid-template-columns:1.4fr 0.9fr 1.1fr 0.9fr 1.3fr 1fr;padding:8px 20px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);flex-shrink:0;border-bottom:1px solid var(--border)}
.feed-scroll{flex:1;overflow-y:auto;padding:0 20px;scrollbar-width:none}
.feed-scroll::-webkit-scrollbar{display:none}
.prow{display:grid;grid-template-columns:1.4fr 0.9fr 1.1fr 0.9fr 1.3fr 1fr;padding:14px 0;border-bottom:1px solid var(--border);align-items:center}
.prow:last-child{border-bottom:none}
.prow.new{animation:rowIn 0.5s ease,rowFlash 1.5s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowFlash{0%{background:rgba(0,229,160,0.08)}100%{background:transparent}}
.date-group-hdr{padding:10px 0 6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.date-group-count{font-size:11px;color:var(--blue);font-weight:600}
.c-agent{display:flex;align-items:center;gap:9px;min-width:0}
.c-av{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.c-name{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-date{font-size:13px;color:var(--text2)}
.c-policy{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-carrier{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px}
.c-annual{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--green)}
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:15px}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--gborder);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;transform:translateY(80px);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:99;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{width:38px;height:38px;border-radius:10px;background:var(--gdim);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.toast-title{font-size:13px;font-weight:700;color:var(--green)}
.toast-body{font-size:12px;color:var(--text2);margin-top:2px}

/* Loading */
.loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:200;transition:opacity 0.6s}
.loading.hide{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:0.1em;color:#fff;text-transform:uppercase}
.loading-sub{font-size:12px;color:var(--text3);letter-spacing:0.06em}
</style>
</head>
<body>

<div class="loading" id="loading">
  <svg width="60" height="46" viewBox="0 0 40 30" fill="none" style="margin-bottom:4px">
    <path d="M20 15 C14 8 6 5 2 8 C6 10 10 14 14 18 C16 20 18 21 20 20 C22 21 24 20 26 18 C30 14 34 10 38 8 C34 5 26 8 20 15Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
    <line x1="19" y1="14" x2="15" y2="9" stroke="#4da6ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="14" x2="25" y2="9" stroke="#4da6ff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div class="loading-logo">Black Wing Ventures</div>
  <div class="loading-sub">Loading sales data…</div>
  <div class="spinner"></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <svg width="44" height="34" viewBox="0 0 40 30" fill="none">
      <path d="M20 15 C14 8 6 5 2 8 C6 10 10 14 14 18 C16 20 18 21 20 20 C22 21 24 20 26 18 C30 14 34 10 38 8 C34 5 26 8 20 15Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="0.7"/>
      <line x1="19" y1="14" x2="15" y2="9" stroke="#4da6ff" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="21" y1="14" x2="25" y2="9" stroke="#4da6ff" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <div>
      <div class="brand-name">Black Wing Ventures</div>
      <div class="brand-sub">Live Sales Dashboard</div>
    </div>
  </div>
  <div class="topbar-center">
    <button class="period-btn on" onclick="setPeriod('today',this)">Today</button>
    <button class="period-btn" onclick="setPeriod('week',this)">This Week</button>
    <button class="period-btn" onclick="setPeriod('month',this)">This Month</button>
    <button class="period-btn" onclick="setPeriod('all',this)">All Time</button>
    <input type="date" class="date-input" id="datePicker" onchange="setDatePicker(this.value)" title="Pick a specific date">
  </div>
  <div class="topbar-right">
    <div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
    <div class="live-pill"><div class="pulse" id="liveDot"></div><span id="liveLabel">LIVE</span></div>
  </div>
</div>

<!-- BODY -->
<div class="body">
  <div class="metrics" id="metrics"></div>
  <div class="main">
    <div class="lb">
      <div class="lb-head">🏆 Leaderboard <span class="lb-period" id="lbPeriod">TODAY</span></div>
      <div class="lb-list" id="lbList"></div>
    </div>
    <div class="feed">
      <div class="feed-top">
        <div><span class="feed-title">Policy Feed</span><span class="feed-period" id="feedPeriod">Today</span></div>
      </div>
      <div class="col-heads">
        <span>Agent</span><span>Sold Date</span><span>Policy #</span><span>Eff. Date</span><span>Carrier</span><span>Annual</span>
      </div>
      <div class="feed-scroll" id="feedScroll"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon">🎉</div>
  <div><div class="toast-title" id="toastTitle">New policy!</div><div class="toast-body" id="toastBody">—</div></div>
</div>

<script>
const SHEET_ID='1xbKN-MqdZkTCVC-htkyVg28JWRcnR4kdBV_BU28l80k';
const SHEET_NAME='Sold%20Policies%20w%20Policy%20%23%204%2F16%2B';
const POLL_MS=15000;
const COL={soldDate:0,agent:1,policy:2,status:3,carrier:9,product:10,effDate:11,monthly:12,annual:13,source:17};
const AV=[['rgba(0,229,160,0.15)','#00e5a0'],['rgba(77,166,255,0.15)','#4da6ff'],['rgba(255,179,64,0.15)','#ffb340'],['rgba(155,127,255,0.15)','#9b7fff'],['rgba(255,95,95,0.15)','#ff5f5f'],['rgba(52,211,153,0.15)','#34d399'],['rgba(251,191,36,0.15)','#fbbf24'],['rgba(167,139,250,0.15)','#a78bfa']];
function av(n){return AV[Math.abs((n||'').charCodeAt(0)+(n||'a').charCodeAt((n||'a').length-1))%AV.length]}
function initials(n){return(n||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function fmtAnnual(v){const n=Number(v)||0;return n?'$'+Math.round(n).toLocaleString():'—'}
function parseSheetDate(v){if(!v)return null;const m=String(v).match(/Date\((\d+),(\d+),(\d+)\)/);if(m)return new Date(+m[1],+m[2],+m[3]);return null}
function toYMD(d){if(!d)return'';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtShort(d){if(!d)return'—';return d.toLocaleDateString([],{month:'short',day:'numeric'})}

let allRows=[],prevCount=0,activePeriod='today',pickedDate=null,initialized=false,toastTimer=null;

async function fetchSheet(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}&t=${Date.now()}`;
  try{
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    return(json.table.rows||[]).map(r=>({
      soldDate:parseSheetDate(r.c[COL.soldDate]?.v),
      soldDateStr:toYMD(parseSheetDate(r.c[COL.soldDate]?.v)),
      agent:r.c[COL.agent]?.v||'Unknown',
      policy:r.c[COL.policy]?.v||'—',
      status:r.c[COL.status]?.v||'—',
      carrier:r.c[COL.carrier]?.v||'—',
      product:r.c[COL.product]?.v||'—',
      effDate:parseSheetDate(r.c[COL.effDate]?.v),
      monthly:Number(r.c[COL.monthly]?.v)||0,
      annual:Number(r.c[COL.annual]?.v)||0,
      source:r.c[COL.source]?.v||'—',
    })).filter(r=>r.agent&&r.agent!=='Agent Name'&&r.annual>0);
  }catch(e){console.error(e);return null;}
}

async function poll(){
  const rows=await fetchSheet();
  if(!rows){
    document.getElementById('liveDot').style.background='var(--amber)';
    document.getElementById('liveLabel').textContent='RECONNECTING';
    return;
  }
  document.getElementById('liveDot').style.background='var(--green)';
  document.getElementById('liveLabel').textContent='LIVE';
  if(initialized&&rows.length>prevCount)showToast(rows[rows.length-1]);
  allRows=[...rows].reverse();
  prevCount=rows.length;
  if(!initialized){document.getElementById('loading').classList.add('hide');initialized=true;}
  render();
}

function getToday(){return toYMD(new Date())}
function getWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());return toYMD(d)}
function getMonthStart(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'}

function filterPeriod(rows){
  if(activePeriod==='today')return rows.filter(r=>r.soldDateStr===getToday());
  if(activePeriod==='week')return rows.filter(r=>r.soldDateStr>=getWeekStart());
  if(activePeriod==='month')return rows.filter(r=>r.soldDateStr>=getMonthStart());
  if(activePeriod==='date'&&pickedDate)return rows.filter(r=>r.soldDateStr===pickedDate);
  return rows;
}

function periodLabel(){
  if(activePeriod==='today')return'Today';
  if(activePeriod==='week')return'This Week';
  if(activePeriod==='month')return'This Month';
  if(activePeriod==='all')return'All Time';
  if(activePeriod==='date'&&pickedDate){const d=new Date(pickedDate+'T00:00:00');return d.toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'});}
  return'';
}

function setPeriod(p,btn){
  activePeriod=p;pickedDate=null;
  document.getElementById('datePicker').value='';
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function setDatePicker(val){
  if(!val)return;
  pickedDate=val;activePeriod='date';
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('on'));
  render();
}

function render(){
  const rows=filterPeriod(allRows);
  const label=periodLabel();
  document.getElementById('lbPeriod').textContent=label.toUpperCase();
  document.getElementById('feedPeriod').textContent=label;
  renderMetrics(rows);
  renderLeaderboard(rows);
  renderFeed(rows);
}

function renderMetrics(rows){
  const totalAnnual=rows.reduce((s,r)=>s+r.annual,0);
  const agents=new Set(rows.map(r=>r.agent)).size;
  document.getElementById('metrics').innerHTML=`
    <div class="metric m1"><div class="metric-label">Annual Premium</div><div class="metric-val">$${Math.round(totalAnnual).toLocaleString()}</div><div class="metric-sub">${periodLabel()} total</div></div>
    <div class="metric m2"><div class="metric-label">Policies Submitted</div><div class="metric-val">${rows.length}</div><div class="metric-sub">${periodLabel().toLowerCase()}</div></div>
    <div class="metric m4"><div class="metric-label">Active Agents</div><div class="metric-val">${agents}</div><div class="metric-sub">producing ${periodLabel().toLowerCase()}</div></div>`;
}

function renderLeaderboard(rows){
  const m={};
  rows.forEach(r=>{
    if(!m[r.agent])m[r.agent]={name:r.agent,count:0,annual:0,active:0};
    m[r.agent].count++;m[r.agent].annual+=r.annual;
    if((r.status||'').toLowerCase().includes('active'))m[r.agent].active++;
  });
  const agents=Object.values(m).sort((a,b)=>b.annual-a.annual);
  if(!agents.length){document.getElementById('lbList').innerHTML='<div class="empty">No sales in this period</div>';return;}
  const max=agents[0].annual||1;
  const MEDALS=['🥇','🥈','🥉'];
  document.getElementById('lbList').innerHTML=agents.map((a,i)=>{
    const[abg,atc]=av(a.name);
    const rc=i<3?'r'+(i+1):'';
    return`<div class="lb-row ${rc}">
      <div class="lb-rank">${i<3?MEDALS[i]:i+1}</div>
      <div class="lb-av" style="background:${abg};color:${atc}">${initials(a.name)}</div>
      <div class="lb-info"><div class="lb-name">${a.name}</div><div class="lb-meta">${a.count} polic${a.count===1?'y':'ies'} · ${a.active} active</div></div>
      <div class="lb-amt"><div class="lb-prem">$${Math.round(a.annual).toLocaleString()}</div></div>
      <div class="lb-bar-bg"><div class="lb-bar" style="width:${Math.round(a.annual/max*100)}%"></div></div>
    </div>`;
  }).join('');
}

function renderFeed(rows){
  const el=document.getElementById('feedScroll');
  if(!rows.length){el.innerHTML=`<div class="empty">${allRows.length?'No policies in this period':'Waiting for data…'}</div>`;return;}
  const showGroups=activePeriod!=='today'&&activePeriod!=='date';
  const grouped={};
  rows.forEach(r=>{const k=r.soldDateStr||'Unknown';if(!grouped[k])grouped[k]=[];grouped[k].push(r);});
  const sortedDates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  let html='';
  sortedDates.forEach(dateKey=>{
    const dayRows=grouped[dateKey];
    if(showGroups){
      const d=new Date(dateKey+'T00:00:00');
      const dayTotal=dayRows.reduce((s,r)=>s+r.annual,0);
      html+=`<div class="date-group-hdr"><span>${d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</span><span class="date-group-count">${dayRows.length} polic${dayRows.length===1?'y':'ies'} · $${Math.round(dayTotal).toLocaleString()}</span></div>`;
    }
    dayRows.forEach((r,i)=>{
      const[abg,atc]=av(r.agent);
      const isNew=i===0&&initialized&&dateKey===getToday();
      html+=`<div class="prow ${isNew?'new':''}">
        <div class="c-agent"><div class="c-av" style="background:${abg};color:${atc}">${initials(r.agent)}</div><span class="c-name">${r.agent}</span></div>
        <div class="c-date">${fmtShort(r.soldDate)}</div>
        <div class="c-policy">${r.policy}</div>
        <div class="c-date">${fmtShort(r.effDate)}</div>
        <div class="c-carrier">${r.carrier}</div>
        <div class="c-annual">${fmtAnnual(r.annual)}</div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function showToast(r){
  clearTimeout(toastTimer);
  document.getElementById('toastTitle').textContent='New sale — '+r.agent+'!';
  document.getElementById('toastBody').textContent=fmtAnnual(r.annual)+'/yr · '+r.carrier;
  const t=document.getElementById('toast');t.classList.add('show');
  toastTimer=setTimeout(()=>t.classList.remove('show'),5000);
}

function tickClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('clockDate').textContent=n.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});
}

document.getElementById('datePicker').value=toYMD(new Date());
tickClock();setInterval(tickClock,1000);
poll();setInterval(poll,POLL_MS);
</script>
</body>
</html>
